name: Plugin CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-package:
    name: Validate & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate plugin files
        run: php scripts/validate-plugin.php

      - name: Package plugin artifact
        run: bash scripts/package-plugin.sh

      - name: Show release checksum
        run: cat dist/youtubearr.zip.sha256

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: youtubearr-artifact
          path: |
            dist/youtubearr.zip
            dist/youtubearr.zip.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate-and-package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Package plugin
        run: bash scripts/package-plugin.sh youtubearr-${{ github.ref_name }}.zip

      - name: Read checksum
        id: checksum
        run: echo "sha256=$(cat dist/youtubearr-${{ github.ref_name }}.zip.sha256)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            php artisan plugins:stage-github-release \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/youtubearr-${{ github.ref_name }}.zip \
              --sha256=${{ steps.checksum.outputs.sha256 }}
            ```

            **SHA-256:** `${{ steps.checksum.outputs.sha256 }}`
          files: |
            dist/youtubearr-${{ github.ref_name }}.zip
            dist/youtubearr-${{ github.ref_name }}.zip.sha256
